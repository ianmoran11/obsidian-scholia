<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scholia Question Callout Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f5f6f8;
        color: #1d232f;
      }

      body {
        margin: 0;
        padding: 48px;
      }

      main {
        max-width: 900px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 24px;
        font-size: 28px;
        font-weight: 720;
      }

      .callout {
        border-left: 5px solid #6b8afd;
        background: #ffffff;
        border-radius: 6px;
        box-shadow: 0 12px 30px rgb(34 42 54 / 10%);
        padding: 18px 22px;
      }

      .header {
        margin: 0 0 16px;
        font-weight: 700;
        color: #32405c;
      }

      .section {
        margin: 0 0 14px;
        line-height: 1.5;
      }

      .label {
        font-weight: 700;
      }

      .context {
        color: #516074;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Scholia custom probe callout</h1>
      <section class="callout" aria-label="Scholia generated callout">
        <p class="header">[!scholia-probe]- Probe: Probe</p>
        <p class="section">
          <span class="label">Context:</span>
          <span class="context">Memory improves when retrieval is effortful.</span>
        </p>
        <p class="section">
          <span class="label">Question:</span>
          How does this relate to spaced repetition?<br />
          Give me a study example.
        </p>
        <p class="section">
          <span class="label">Response:</span>
          Space reviews so each recall attempt is slightly challenging.
        </p>
      </section>
    </main>
  </body>
</html>
